<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Game Memory Card Matematika - Cocokkan soal dengan jawabannya!">
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4CAF50">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <title>🃏 Memory Card - MathFun Indonesia</title>
  <style>
    .game-wrapper { min-height: calc(100vh - 80px); background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); padding: 2rem 0; }
    .game-hud { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; }
    .hud-item { background: white; padding: 0.75rem 1.5rem; border-radius: 2rem; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    #memoryGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; max-width: 500px; margin: 0 auto; }
    .memory-card { width: 100%; aspect-ratio: 1; perspective: 1000px; cursor: pointer; }
    .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .memory-card.flipped .card-inner, .memory-card.matched .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 1rem; font-weight: 700; font-size: 1.2rem; }
    .card-front { background: linear-gradient(135deg, #2196F3, #1976D2); color: white; font-size: 2rem; }
    .card-back { background: white; transform: rotateY(180deg); border: 3px solid #4CAF50; color: #333; }
    .memory-card.matched .card-back { background: #C8E6C9; border-color: #4CAF50; }
    .memory-card.wrong .card-back { background: #FFCDD2; border-color: #F44336; animation: shake 0.5s; }
    @keyframes shake { 0%, 100% { transform: rotateY(180deg) translateX(0); } 25% { transform: rotateY(180deg) translateX(-10px); } 75% { transform: rotateY(180deg) translateX(10px); } }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-mathfun">
    <div class="container">
      <a class="navbar-brand" href="/">🧮 MathFun</a>
      <a href="/" class="btn btn-outline-light btn-sm">← Kembali</a>
    </div>
  </nav>

  <div class="game-wrapper">
    <div class="container">
      <h2 class="text-center mb-4">🃏 Memory Card Matematika</h2>
      <div class="game-hud">
        <div class="hud-item">🔄 Percobaan: <span id="moves">0</span></div>
        <div class="hud-item">✅ Pasangan: <span id="pairs">0/4</span></div>
      </div>
      <div id="memoryGrid"></div>
      <div class="text-center mt-4">
        <button class="btn btn-primary btn-mathfun" id="restartMemoryBtn">🔄 Main Lagi</button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="memoryCompleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center">
        <div class="modal-header bg-success text-white"><h5 class="modal-title">🎉 Hebat!</h5></div>
        <div class="modal-body">
          <h3>Semua kartu cocok!</h3>
          <p>Total percobaan: <span id="memoryMoves">0</span></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="playAgainBtn">🔄 Main Lagi</button>
          <a href="/" class="btn btn-secondary">🏠 Beranda</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/game.js"></script>
  <script>
    class MemoryGameUI {
      constructor() { this.game = new MemoryGame(); }
      init() { this.game.init(1); document.getElementById('playAgainBtn').addEventListener('click', () => { this.game.restart(); bootstrap.Modal.getInstance(document.getElementById('memoryCompleteModal')).hide(); }); }
    }
    document.addEventListener('DOMContentLoaded', () => { const ui = new MemoryGameUI(); ui.init(); });
  </script>
</body>
</html>
